name: vayben
description: Aplicación de movilidad segura para Tulcán - UPEC 2025.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  provider: ^6.1.2
  video_player: ^2.9.1
  share_plus: ^10.0.3   # AÑADIDO PARA COMPARTIR

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/